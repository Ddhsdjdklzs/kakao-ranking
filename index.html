<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 랭킹</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { color: #f0c040; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 12px 24px;
      margin: 8px 0;
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .rank { font-size: 24px; width: 40px; text-align: center; }
    .name { flex: 1; font-size: 18px; font-weight: bold; }
    .count { color: #f0c040; font-size: 16px; }
    .updated { color: #555; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>

  <h1>📊 채팅 랭킹</h1>
  <p class="subtitle">10초마다 자동 갱신</p>
  <div id="ranking-list"></div>
  <p class="updated" id="updated-time"></p>

  <script>
    const SUPABASE_URL = "https://xxxxxxxxxx.supabase.co"; // 본인 URL
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xxxxx"; // 본인 KEY
    const medals = ["🥇", "🥈", "🥉"];

    async function loadRanking() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/ranking?order=chat_count.desc&limit=10`,
          {
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`
            }
          }
        );
        const data = await res.json();
        const list = document.getElementById("ranking-list");

        list.innerHTML = data.map((player, i) => `
          <div class="card">
            <div class="rank">${medals[i] ?? (i + 1) + "위"}</div>
            <div class="name">${player.name}</div>
            <div class="count">${player.chat_count.toLocaleString()}회</div>
          </div>
        `).join("");

        document.getElementById("updated-time").textContent =
          "마지막 갱신: " + new Date().toLocaleTimeString("ko-KR");

      } catch(e) {
        console.error("불러오기 실패:", e);
      }
    }

    loadRanking();
    setInterval(loadRanking, 10000); // 10초마다 갱신
  </script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
